<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📦 发货模板中心</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-page: #F6F5F1;
    --bg-card: #FFFFFF;
    --bg-accent: #F0EFEA;
    --bg-blue: #E8F0FE;
    --text-primary: #1A1A1A;
    --text-secondary: #5F5E5A;
    --text-muted: #888780;
    --border: #E5E3D8;
    --border-light: #F0EFEA;
    --accent: #2563EB;
    --accent-light: #DBEAFE;
    --green: #059669;
    --green-light: #D1FAE5;
    --sidebar-width: 200px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    line-height: 1.7;
    display: flex;
    min-height: 100vh;
  }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    height: 100vh;
    position: sticky;
    top: 0;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    z-index: 50;
  }
  .sidebar-header { padding: 28px 20px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { font-size: 14px; font-weight: 600; color: var(--text-primary); letter-spacing: 0.3px; }
  .sidebar-header .sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .sidebar-header .online-badge { display: inline-block; font-size: 10px; padding: 2px 10px; border-radius: 20px; background: var(--green-light); color: var(--green); font-weight: 500; margin-top: 8px; }
  .sidebar-nav { padding: 12px; flex: 1; }
  .sidebar-nav a {
    display: block; padding: 7px 12px; border-radius: 6px;
    font-size: 12px; color: var(--text-secondary); text-decoration: none;
    transition: background 0.15s, color 0.15s; margin-bottom: 2px;
  }
  .sidebar-nav a:hover { background: var(--bg-accent); color: var(--text-primary); }
  .sidebar-nav a .num { float: right; color: var(--text-muted); font-size: 11px; }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text-muted); line-height: 1.5; }

  /* MAIN */
  .main-content { flex: 1; max-width: 1100px; padding: 0 36px 60px; min-width: 0; }

  /* HEADER */
  .doc-header { padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
  .doc-header h1 { font-size: 26px; font-weight: 700; color: var(--text-primary); letter-spacing: 0.5px; }
  .doc-header .meta { display: flex; flex-wrap: wrap; gap: 6px 20px; margin-top: 10px; font-size: 12px; color: var(--text-muted); }

  /* SECTION */
  .section { margin-bottom: 28px; scroll-margin-top: 20px; }
  .section-title {
    font-size: 16px; font-weight: 600; color: var(--text-primary);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .section-title .num {
    width: 24px; height: 24px; border-radius: 5px; background: var(--accent);
    color: white; display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
  }

  /* GRID */
  .section-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* CARD */
  .card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    padding: 18px 20px; transition: box-shadow 0.15s; display: flex; flex-direction: column;
  }
  .card:hover { box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
  .card .badge {
    display: inline-block; font-size: 9px; padding: 2px 10px; border-radius: 10px;
    margin-bottom: 8px; width: fit-content; font-weight: 500;
  }
  .card h3 { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; line-height: 1.4; }
  .card .ext { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
  .card .fields { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 12px; flex: 1; align-content: flex-start; }
  .card .fields span {
    background: var(--bg-accent); padding: 2px 7px; border-radius: 4px;
    font-size: 10px; color: var(--text-secondary);
  }
  .card .download-link {
    display: block; text-align: center; padding: 7px 0; border-radius: 6px;
    font-size: 12px; font-weight: 500; text-decoration: none;
    background: var(--accent); color: #fff; transition: background 0.15s;
  }
  .card .download-link:hover { background: #1D4ED8; }

  /* INFO BLOCK */
  .info-note {
    background: var(--bg-blue); border: 1px solid var(--accent-light); border-radius: 8px;
    padding: 14px 18px; margin-bottom: 20px;
  }
  .info-note h4 { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .info-note p { font-size: 11px; color: var(--text-secondary); line-height: 1.6; }

  /* TABLE */
  .summary-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
  .summary-table th { padding: 7px 12px; text-align: left; font-size: 10px; font-weight: 500; color: var(--text-muted); background: var(--bg-accent); border-bottom: 1px solid var(--border); }
  .summary-table td { padding: 7px 12px; color: var(--text-secondary); border-bottom: 1px solid var(--border-light); }
  .summary-table tr:last-child td { border-bottom: none; }
  .summary-table td .badge-sm { font-size: 9px; padding: 1px 8px; border-radius: 10px; display: inline-block; }

  /* FOOTER */
  .doc-footer { text-align: center; padding: 24px 0 16px; border-top: 1px solid var(--border); margin-top: 36px; }
  .doc-footer p { font-size: 10px; color: var(--text-muted); }

  @media (max-width: 860px) {
    body { flex-direction: column; }
    .sidebar { width: 100%; min-width: auto; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); }
    .sidebar-nav { display: flex; flex-wrap: wrap; gap: 4px; }
    .sidebar-nav a { flex: 1; min-width: 100px; text-align: center; }
    .section-grid { grid-template-columns: 1fr 1fr; }
    .main-content { padding: 0 16px 40px; }
  }
  @media (max-width: 560px) {
    .section-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <h1>📦 发货模板中心</h1>
    <div class="sub">6个模板 · 在线下载</div>
    <div class="online-badge">● GitHub Pages</div>
  </div>
  <div class="sidebar-nav">
    <a href="#all">📋 全部模板</a>
    <a href="#summary">📊 字段一览</a>
  </div>
  <div class="sidebar-footer">
    托管于 GitHub Pages<br>
    更新后自动生效
  </div>
</div>

<div class="main-content">
  <div class="doc-header">
    <h1>📦 发货模板中心</h1>
    <div class="meta">
      <span>6 个模板 · 在线下载 · 即取即用</span>
    </div>
  </div>

  <div class="section" id="all">
    <div class="section-title"><span class="num">1</span> 全部模板</div>
    <div class="section-grid" id="cardGrid"></div>
  </div>

  <div class="section" id="summary">
    <div class="section-title"><span class="num">2</span> 字段一览</div>
    <table class="summary-table">
      <thead>
        <tr><th>模板</th><th>分类</th><th>格式</th><th>列数</th><th>核心字段</th></tr>
      </thead>
      <tbody id="summaryBody"></tbody>
    </table>
  </div>

  <div class="doc-footer">
    <p>模板文件保存在 GitHub 仓库 · 有更新直接覆盖即可</p>
  </div>
</div>

<script>
const DATA = [
  {n:"至臻薯薯订单导入模板",f:"至臻薯薯订单导入模板.xls",s:"26 KB",b:"分销线上",c:"#E0F2FE",tc:"#0284C7",h:["下单时间","买家帐号","收货人姓名","手机","地址","商品名称","规格","商品编码","数量","快递公司","快递单号","备注"]},
  {n:"从茸菌菇订单导入模板",f:"从茸菌菇订单导入模板.xls",s:"1.2 MB",b:"分销线上",c:"#E0F2FE",tc:"#0284C7",h:["下单时间","买家帐号","收货人姓名","手机","地址","商品编码","商品名称","数量","商品单价","快递公司","快递单号","备注"]},
  {n:"佛山仓订单导入模板",f:"佛山仓订单导入模板.xls",s:"45 KB",b:"分销线上",c:"#E0F2FE",tc:"#0284C7",h:["店铺名称","原始单号","收件人","手机","地址","发货条件","应收合计","商家编码","货品数量","备注","订单类别","证件号码","批次号","标记"]},
  {n:"叽里咕噜推单模板-寄样-正常订单",f:"叽里咕噜推单模板-寄样-正常订单.xlsx",s:"15 KB",b:"分销线上",c:"#E0F2FE",tc:"#0284C7",h:["渠道","日期","收件人","联系电话","寄样地址","产品名称","产品规格","数量","寄样单号","特殊要求","快递费用","备注"]},
  {n:"吉客云订单导入模板V1",f:"吉客云订单导入模板V1.xlsx",s:"20 KB",b:"全渠道",c:"#E0E7FF",tc:"#4F46E5",h:["导入编号","客户账号","收货人","手机","收货地址","客户备注","销售渠道名称","货品编号","数量","单价","业务员","跟单员","标记"]},
  {n:"三匠红薯订单导入模板V1",f:"三匠红薯订单导入模板V1.xlsx",s:"16 KB",b:"分销线上",c:"#E0F2FE",tc:"#0284C7",h:["平台订单号","收件人姓名","收件人手机","收件人地址","分销商家编码","条形码","货品数量","货品单价","金额小计","邮费收入","店铺","买家留言","客服备注","买家昵称"]}
];

const BASE = "https://n0bad.github.io/shipping-templates/";

const grid = document.getElementById('cardGrid');
DATA.forEach(d => {
  const card = document.createElement('div'); card.className = 'card';
  card.innerHTML = `
    <span class="badge" style="background:${d.c};color:${d.tc}">${d.b}</span>
    <h3>${d.n}</h3>
    <div class="ext">${d.f} · ${d.s} · ${d.h.length}列</div>
    <div class="fields">${d.h.map(x=>'<span>'+x+'</span>').join('')}</div>
    <a class="download-link" href="${BASE}${d.f}" target="_blank">⬇ 下载</a>
  `;
  grid.appendChild(card);
});

const tbody = document.getElementById('summaryBody');
DATA.forEach(d => {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td style="font-weight:500;color:var(--text-primary)">${d.n}</td>
    <td><span class="badge-sm" style="background:${d.c};color:${d.tc}">${d.b}</span></td>
    <td style="color:var(--text-muted)">${d.f.split('.').pop()}</td>
    <td>${d.h.length}</td>
    <td style="max-width:280px">${d.h.slice(0,6).join('、')}…</td>
  `;
  tbody.appendChild(tr);
});
</script>
</body>
</html>
